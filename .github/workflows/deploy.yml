# ─────────────────────────────────────────────────────────────────────────────
# ECommerceCenter – Build & Deploy to Azure App Service
# Triggers on push to main. Deploys infra via Bicep then publishes the API.
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

# ── Global environment – change these once, used everywhere ──────────────────
env:
  AZURE_RG: rg-ecommercecenter # REPLACE_ME – your Azure resource group name
  APP_NAME: ecommercecenter # REPLACE_ME – must match Bicep param appName
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: src/ECommerceCenter.API/ECommerceCenter.API.csproj
  PUBLISH_DIR: ./publish

permissions:
  contents: read

jobs:
  # ╭──────────────────────────────────────────╮
  # │  1. Build & Publish                      │
  # ╰──────────────────────────────────────────╯
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ${{ env.PUBLISH_DIR }}

  # ╭──────────────────────────────────────────╮
  # │  2. Deploy Infrastructure (Bicep)        │
  # ╰──────────────────────────────────────────╯
  infra:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Test Azure login
        run: az account show

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RG }}
          template: infra/main.bicep
          parameters: >-
            appName="${{ env.APP_NAME }}"
            connectionStringDefault="${{ secrets.CONNECTION_STRING_DEFAULT }}"
            jwtSecretKey="${{ secrets.JWT_SECRET_KEY }}"
            smtpPassword="${{ secrets.SMTP_PASSWORD }}"
            smtpUsername="${{ secrets.SMTP_USERNAME }}"
            frontendBaseUrl="${{ secrets.FRONTEND_BASE_URL }}"
            cjApiKey="${{ secrets.CJ_API_KEY }}"
            stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}"
            stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            blobStorageAccountName="${{ secrets.BLOB_STORAGE_ACCOUNT_NAME }}"
            blobStorageAccountKey="${{ secrets.BLOB_STORAGE_ACCOUNT_KEY }}"
          failOnStdErr: false

  # ╭──────────────────────────────────────────╮
  # │  3. Deploy App to Azure App Service      │
  # ╰──────────────────────────────────────────╯
  deploy:
    runs-on: ubuntu-latest
    needs: [build, infra]

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: api-package
          path: ${{ env.PUBLISH_DIR }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Test Azure login
        run: az account show

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}-api
          package: ${{ env.PUBLISH_DIR }}

      - name: Set Firebase service account JSON
        run: |
          az webapp config appsettings set \
            --name "${{ env.APP_NAME }}-api" \
            --resource-group "${{ env.AZURE_RG }}" \
            --settings "FirebaseAuth__ServiceAccountJson=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}"

      - name: Azure logout
        if: always()
        run: az logout
